<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>YouTube 搜索播放（无API）</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui, sans-serif;
}
body{
  max-width:1000px;
  margin:30px auto;
  padding:0 20px;
  background:#f9f9f9;
}
.search-bar{
  display:flex;
  gap:10px;
  margin-bottom:25px;
}
#searchInput{
  flex:1;
  padding:12px 16px;
  border:1px solid #ddd;
  border-radius:8px;
  font-size:16px;
}
#searchBtn{
  padding:12px 24px;
  background:#ff0000;
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:16px;
}
#searchBtn:hover{
  background:#d60000;
}
.player-box{
  width:100%;
  aspect-ratio:16/9;
  background:#000;
  border-radius:12px;
  overflow:hidden;
  margin-bottom:30px;
}
#player{
  width:100%;
  height:100%;
  border:none;
}
.tip{
  color:#666;
  font-size:14px;
  margin-bottom:10px;
}
</style>
</head>
<body>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="输入关键词搜索YouTube视频">
  <button id="searchBtn">搜索播放</button>
</div>

<div class="tip">提示：首次播放可能需要点击播放器内的播放按钮</div>
<div class="player-box">
  <iframe id="player" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
</div>

<script>
const input = document.getElementById('searchInput');
const btn = document.getElementById('searchBtn');
const player = document.getElementById('player');

// 搜索并播放
function searchAndPlay(){
  const word = input.value.trim();
  if(!word) return;
  
  // 无API方案：使用YouTube搜索结果的随机视频嵌入
  player.src = `https://www.youtube.com/embed?listType=search&list=${encodeURIComponent(word)}`;
}

btn.addEventListener('click', searchAndPlay);
input.addEventListener('keypress', (e)=>{
  if(e.key === 'Enter') searchAndPlay();
});
</script>

</body>
</html>
